<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Pusher | 最新時事看板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 600;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        #news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .news-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.6s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(56, 189, 248, 0.3);
        }

        .card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #1e293b;
        }

        .card-content {
            padding: 24px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .category {
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .title-zh {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
        }

        .title-en {
            font-size: 0.9rem;
            font-style: italic;
            color: var(--text-dim);
            margin-bottom: 16px;
        }

        .excerpt {
            font-size: 0.95rem;
            color: #cbd5e1;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .btn-read {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn-read:hover { opacity: 0.8; }

        .loading {
            text-align: center;
            padding: 100px;
            font-size: 1.2rem;
            color: var(--text-dim);
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            #news-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>News Pusher Feed</h1>
            <p class="subtitle">AI 自動翻譯與繞過付費牆的時事看板</p>
        </header>

        <div id="news-grid">
            <div class="loading">正在載入最新消息...</div>
        </div>
    </div>

    <script>
        async function loadNews() {
            try {
                // We'll fetch news-data.json which the script will generate
                const response = await fetch('./news-data.json');
                const data = await response.json();
                
                const grid = document.getElementById('news-grid');
                grid.innerHTML = '';

                if (!data || data.length === 0) {
                    grid.innerHTML = '<div class="loading">目前尚無新聞紀錄。</div>';
                    return;
                }

                data.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'news-card';
                    card.style.animationDelay = (index * 0.1) + 's';

                    card.innerHTML = `
                        <img src="${item.image || 'https://images.unsplash.com/photo-1504711432869-efd597cdd0bf?auto=format&fit=crop&q=80&w=800'}" class="card-image" alt="news cover">
                        <div class="card-content">
                            <div class="category">${item.category_zh || item.category}</div>
                            <h2 class="title-zh">${item.title_zh}</h2>
                            <p class="title-en">${item.title}</p>
                            <p class="excerpt">${item.excerpt_zh}</p>
                            <div class="footer">
                                <span>⏳ ${item.readingTime} 分鐘</span>
                                <a href="${item.url}" target="_blank" class="btn-read">閱讀全文 →</a>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                document.getElementById('news-grid').innerHTML = '<div class="loading">無法載入新聞數據，請確認 GitHub Actions 是否已執行並產生 news-data.json。</div>';
                console.error(err);
            }
        }

        loadNews();
    </script>
</body>
</html>
